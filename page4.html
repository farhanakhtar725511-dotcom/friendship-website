
<!DOCTYPE html>
<html>
<head>
<title>Question</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#ffd6e0;
    color:#333;
    text-align:center;
}
.container {
    margin-top:120px;
    animation: fade 1.5s;
}
@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff4d88;
    color:white;
    font-size:16px;
}
#noBtn {
    position:absolute;
}
</style>

<script>
function typeWriter(id, text, i=0) {
    if (i < text.length) {
        document.getElementById(id).innerHTML += text.charAt(i);
        setTimeout(function(){ typeWriter(id, text, i+1); }, 50);
    }
}
</script>

<script>
function moveBtn(){
    var btn = document.getElementById('noBtn');
    btn.style.top = Math.random()*400 + 'px';
    btn.style.left = Math.random()*300 + 'px';
}
</script>
</head>
<body>
<div class="container">
<h2>Will you stay with me forever? 💖</h2>
<br>
<button onclick="location.href='page5.html'">YES</button>
<button id="noBtn" onmouseover="moveBtn()">NO</button>
</div>
</body>
</html>
